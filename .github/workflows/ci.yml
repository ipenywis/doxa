name: CI and Cloudflare Deploy

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks-build-deploy:
    name: Checks, build, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Build Cloudflare output
        run: pnpm run build:cloudflare
        env:
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_COMPANY_LINK: ${{ vars.VITE_COMPANY_LINK }}
          VITE_OPENSOURCE_REPO_URL: ${{ vars.VITE_OPENSOURCE_REPO_URL }}

      - name: Deploy to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm run deploy:cloudflare:built
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
